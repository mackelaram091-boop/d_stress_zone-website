<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - D’ Stress Zone</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
</head>
<body>

<nav>
  <h2>D’ Stress Zone</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<section class="hero hero-small">
  <h1>Contact Us</h1>
  <p>We’re here to help—reach out to us anytime</p>
</section>

<section class="contact-form-container">
  <form class="contact-form" onsubmit="return validateForm()">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Your full name" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" required>

    <label for="phone">Phone</label>
    <input type="text" id="phone" placeholder="(123) 456-7890" required>

    <label for="message">Message</label>
    <textarea id="message" placeholder="Write your message here..." required></textarea>

    <button type="submit">Submit</button>
    
    <p id="error" class="form-feedback"></p>
    <p id="success" class="form-feedback"></p>
  </form>
</section>

<footer>
  <p>© 2026 D’ Stress Zone Psychological Services</p>
</footer>

</body>
</html>
